# CI — PORTING modules 13/05/12: every push builds the full package on macOS
# and runs the 550-check golden suite; Windows builds the portable core +
# pebserver and runs the 516-check subset (pebsmokecore) against the SAME
# goldens — bit-identical worldgen AND a dedicated-server/guest e2e over
# plain sockets, cross-platform. Both lanes use temp data roots.
# PEBBLE_REGOLD is forbidden in CI: goldens are frozen.
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    name: macOS build + goldens
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain info
        run: |
          swift --version
          uname -m
          sw_vers
      - name: Refuse regold
        run: |
          if [ -n "${PEBBLE_REGOLD:-}" ]; then
            echo "PEBBLE_REGOLD must never be set in CI"; exit 1
          fi
      - name: Build (release, all targets)
        run: swift build -c release
      - name: Golden suite (hermetic data root)
        run: PEBBLE_DATA_DIR="$RUNNER_TEMP/pebble-data" swift run -c release pebsmoke
      - name: Goldens unmodified
        run: git diff --exit-code goldens/

  windows:
    name: Windows portable core + goldens
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: compnerd/gha-setup-swift@v0.4.0
        with:
          swift-version: swift-6.2.1-release
          swift-build: 6.2.1-RELEASE
      - uses: actions/checkout@v4
      - name: Toolchain info
        run: swift --version
      - name: Refuse regold
        shell: bash
        run: |
          if [ -n "${PEBBLE_REGOLD:-}" ]; then
            echo "PEBBLE_REGOLD must never be set in CI"; exit 1
          fi
      - name: Build the portable golden suite (release)
        run: swift build -c release --product pebsmokecore
      # the same frozen goldens as macOS — passing here proves a Windows
      # Pebble generates bit-identical worlds (PORTING module 13)
      - name: Deterministic golden suite (hermetic data root)
        run: .\.build\release\pebsmokecore.exe
        env:
          PEBBLE_DATA_DIR: ${{ runner.temp }}\pebble-data
          PEBBLE_GOLDENS_DIR: ${{ github.workspace }}\goldens
      - name: Build the dedicated server (release)
        run: swift build -c release --product pebserver
      # --help must exit 0 without touching storage (PORTING module 12)
      - name: pebserver smoke
        run: .\.build\release\pebserver.exe --help
      - name: Build the Windows client shell (release)
        run: swift build -c release --product PebbleWin
      # downloadable demo for real-hardware testing (PORTING modules 07/09):
      # exe + Swift runtime DLLs; grab it from the run's Artifacts section
      - name: Stage the demo artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path stage | Out-Null
          Copy-Item .build\release\PebbleWin.exe stage\Pebble.exe
          $core = (& where.exe swiftCore.dll | Select-Object -First 1)
          Copy-Item (Join-Path (Split-Path -Parent $core) '*.dll') stage\
          New-Item -ItemType Directory -Force -Path stage\assets | Out-Null
          Copy-Item packaging\title-bg.png stage\assets\
          Copy-Item packaging\logo.png stage\assets\
          Set-Content -Path stage\LEES-MIJ.txt -Value "PEBBLE voor Windows (testversie — nog zonder geluid)`r`n`r`nSTARTEN: dubbelklik Pebble.exe — je krijgt HET ECHTE Pebble-titelscherm,`r`nprecies zoals op de Mac: Singleplayer, Multiplayer (direct connect met`r`nip:poort), Options, alles werkt.`r`n`r`nBESTURING: zoals altijd — WASD/spatie/shift/ctrl, E inventaris, T chat,`r`nEsc pauze, links slopen, rechts bouwen. Klik in het venster om te spelen.`r`n`r`nSKIN: leg een skin.png (64x64) in de map PebbleData — vrienden zien hem,`r`njij ziet die van hen.`r`n`r`nPROBLEEM? Stuur pebble-log.txt (naast Pebble.exe) + screenshot (Win+Shift+S)"
      - uses: actions/upload-artifact@v4
        with:
          name: pebble-windows-demo
          path: stage
      - name: Goldens unmodified
        shell: bash
        run: git diff --exit-code goldens/
