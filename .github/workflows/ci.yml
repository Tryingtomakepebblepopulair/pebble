# CI — PORTING module 13: every push builds the full package on macOS and
# runs the 512-check golden suite; Windows builds the portable core and runs
# the 478-check deterministic subset (pebsmokecore) against the SAME goldens,
# proving cross-platform bit-identical worldgen. Both use temp data roots.
# PEBBLE_REGOLD is forbidden in CI: goldens are frozen.
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    name: macOS build + goldens
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain info
        run: |
          swift --version
          uname -m
          sw_vers
      - name: Refuse regold
        run: |
          if [ -n "${PEBBLE_REGOLD:-}" ]; then
            echo "PEBBLE_REGOLD must never be set in CI"; exit 1
          fi
      - name: Build (release, all targets)
        run: swift build -c release
      - name: Golden suite (hermetic data root)
        run: PEBBLE_DATA_DIR="$RUNNER_TEMP/pebble-data" swift run -c release pebsmoke
      - name: Goldens unmodified
        run: git diff --exit-code goldens/

  windows:
    name: Windows portable core + goldens
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: compnerd/gha-setup-swift@v0.4.0
        with:
          swift-version: swift-6.2.1-release
          swift-build: 6.2.1-RELEASE
      - uses: actions/checkout@v4
      - name: Toolchain info
        run: swift --version
      - name: Refuse regold
        shell: bash
        run: |
          if [ -n "${PEBBLE_REGOLD:-}" ]; then
            echo "PEBBLE_REGOLD must never be set in CI"; exit 1
          fi
      - name: Build the portable golden suite (release)
        run: swift build -c release --product pebsmokecore
      # the same frozen goldens as macOS — passing here proves a Windows
      # Pebble generates bit-identical worlds (PORTING module 13)
      - name: Deterministic golden suite (hermetic data root)
        run: .\.build\release\pebsmokecore.exe
        env:
          PEBBLE_DATA_DIR: ${{ runner.temp }}\pebble-data
          PEBBLE_GOLDENS_DIR: ${{ github.workspace }}\goldens
      - name: Goldens unmodified
        shell: bash
        run: git diff --exit-code goldens/
